<!-- Невидимый триггер проверки шаблона -->
{{ trackRender() }}

<div class="node-card" [class.onpush]="strategy() === 'OnPush'">
    <div class="node-card__header">
        <span class="node-card__id">{{ nodeId() }}</span>
        <div style="display: flex; gap: 4px; align-items: center;">
            <span tuiBadge [appearance]="strategy() === 'OnPush' ? 'primary' : 'neutral'" size="s"
                (click)="toggleStrategy()" style="cursor: pointer;" title="Toggle Strategy">
                {{ strategy() }}
            </span>
            <button tuiButton type="button" size="xs" appearance="glass"
                style="min-height: 20px; padding: 0 4px; font-size: 10px;" (click)="toggleVisibility()">
                {{ isCollapsed() ? 'Expand' : 'Collapse' }}
            </button>
        </div>
    </div>
    <div class="node-card__body">
        <strong>{{ label() }}</strong>
        <div style="display: flex; gap: 6px; margin-top: 8px;">
            <button tuiButton type="button" size="xs" appearance="outline" style="min-height: 20px;"
                (click)="simulateTrigger('dom')">
                Event
            </button>
            <button tuiButton type="button" size="xs" appearance="outline" style="min-height: 20px;"
                (click)="triggerPromise()">
                Promise
            </button>
            <button tuiButton type="button" size="xs" appearance="outline" style="min-height: 20px;"
                (click)="simulateTrigger('signal')">
                Signal
            </button>
        </div>
    </div>
    @if (children().length > 0 || true) {
    @if (!isCollapsed()) {
    <div class="node-card__children">
        {{ evaluateChildrenSync() }}
        <ng-content></ng-content>
    </div>
    }
    }
</div>
